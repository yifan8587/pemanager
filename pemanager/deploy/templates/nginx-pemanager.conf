##
## PE Manager — nginx 站点配置
##
## - 80 端口对外；如启用 HTTPS，请在 deploy.md 的"启用 HTTPS（Let's Encrypt）"小节
##   按指引追加 443 server 块。
## - 静态前端在 /opt/pemanager/frontend/dist/
## - /api/ 反代到 Gunicorn unix socket
## - /static/ 反代到 collectstatic 输出目录（admin / DRF 自带静态）
##

upstream pemanager_backend {
    server unix:/run/pemanager/backend.sock fail_timeout=0;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    # 部署后可改为实际域名，例如 server_name pe.example.com;
    server_name _;

    # 大量路由 / netplan YAML 预览可能有较大 payload
    client_max_body_size 16M;
    client_body_buffer_size 1M;

    access_log /var/log/pemanager/nginx-access.log;
    error_log  /var/log/pemanager/nginx-error.log;

    # ---- 前端 SPA（Vue history 模式 fallback 到 index.html）----
    root __PEM_INSTALL_DIR__/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源开启长缓存（带哈希文件名，安全）
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---- Django admin / DRF 静态文件 ----
    location /static/ {
        alias __PEM_STATIC_ROOT__/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ---- API 反代 ----
    location /api/ {
        proxy_pass http://pemanager_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        # 立即下发 / mtr / 长 ping 可能耗时较久；放宽超时
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 10s;
        # 关闭缓冲，便于 SSE / 长连接（如未来引入）
        proxy_buffering off;
    }

    # ---- Django admin ----
    location /admin/ {
        proxy_pass http://pemanager_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
